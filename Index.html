<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashew Pay</title>
    <style>
        /* Точная настройка шрифта Roboto и системных шрифтов мобильных устройств */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        body { background-color: #f4f4f6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #1a1a1a; }
        
        #admin-panel { display: none; width: 100%; background-color: #333; color: #fff; padding: 15px; text-align: center; }
        #admin-panel input { padding: 8px; font-size: 16px; border-radius: 4px; border: none; width: 150px; text-align: center; }
        #admin-panel button { padding: 8px 15px; font-size: 16px; background-color: #2ca880; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        
        header { width: 100%; background-color: #ffffff; padding: 14px 16px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #e2e2e4; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
        
        /* Оригинальный смайлик Cashew с картинки */
        .logo-circle { width: 34px; height: 34px; background-color: #f05423; border-radius: 50%; position: relative; display: flex; justify-content: center; align-items: center; }
        .logo-circle::after { 
            content: ''; 
            position: absolute;
            width: 16px; 
            height: 8px; 
            border: 3.5px solid white;
            border-top: none;
            border-radius: 0 0 16px 16px;
            top: 10px;
        }

        .logo-text { font-size: 32px; font-weight: 700; color: #000000; letter-spacing: -0.6px; }
        
        .card { background-color: #ffffff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); width: 92%; max-width: 360px; margin: 16px auto; padding: 20px; }
        .qr-container { position: relative; width: 100%; max-width: 220px; margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; }
        .qr-image { width: 100%; height: auto; display: block; }
        
        /* Возвращенная анимация плавной пульсации галочки */
        .success-overlay { 
            position: absolute; 
            width: 78px; 
            height: 78px; 
            background-color: #2ca880; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            animation: pulse 1.8s ease-in-out infinite; 
        }
        .success-overlay::after { 
            content: ''; 
            display: block; 
            width: 18px; 
            height: 34px; 
            border: solid white; 
            border-width: 0 5.5px 5.5px 0; 
            transform: rotate(45deg); 
            margin-bottom: 7px; 
        }
        
        @keyframes pulse { 
            0% { transform: scale(0.96); box-shadow: 0 4px 10px rgba(44, 168, 128, 0.25); } 
            50% { transform: scale(1.04); box-shadow: 0 6px 15px rgba(44, 168, 128, 0.45); } 
            100% { transform: scale(0.96); box-shadow: 0 4px 10px rgba(44, 168, 128, 0.25); } 
        }

        /* Настройка точного начертания, серого цвета и межстрочных интервалов */
        .info-block { margin-bottom: 15px; font-size: 15px; line-height: 1.35; }
        .label { color: #707072; margin-bottom: 2px; font-weight: 400; }
        .value { color: #1a1a1a; font-weight: 400; white-space: pre-line; letter-spacing: -0.1px; }
        .value-bold { font-size: 16.5px; font-weight: 400; color: #1a1a1a; margin-top: 1px; letter-spacing: -0.1px; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <label>Гар. номер:</label>
        <input type="text" id="bus-number-input" value="190009">
        <button onclick="updateBusNumber()">Применить</button>
    </div>

    <header>
        <div class="logo-container" onclick="toggleAdminPanel()">
            <div class="logo-circle"></div>
            <div class="logo-text">cashew</div>
        </div>
    </header>

    <div class="card">
        <div class="qr-container">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://cashewpay.by" alt="QR">
            <div class="success-overlay"></div>
        </div>

        <div class="info-block">
            <div class="label">Получатель:</div>
            <div class="value">Оплата проезда в автобусе, гар. номер <span id="bus-number">190009</span><br>г. Осиповичи<br>Осиповичский ф-л Автопарк 19</div>
        </div>

        <div class="info-block">
            <div class="label">Активен с:</div>
            <div id="time-start" class="value-bold">Загрузка...</div>
        </div>

        <div class="info-block">
            <div class="label">Активен до:</div>
            <div id="time-end" class="value-bold">Загрузка...</div>
        </div>

        <div class="info-block">
            <div class="label">Описание:</div>
            <div class="value">#f520997eda826866#</div>
        </div>
        
        <div class="info-block" style="margin-bottom: 0;">
            <div class="label">Цена:</div>
            <div class="value">1.05 бел. руб.</div>
        </div>
    </div>

    <script>
        function toggleAdminPanel() {
            var panel = document.getElementById('admin-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function updateBusNumber() {
            var inputVal = document.getElementById('bus-number-input').value;
            document.getElementById('bus-number').innerText = inputVal;
            try {
                localStorage.setItem('savedBusNumber', inputVal);
            } catch(e) {}
            document.getElementById('admin-panel').style.display = 'none';
        }

        function formatNumber(num) { return num < 10 ? '0' + num : num; }

        function formatDate(date) {
            return formatNumber(date.getDate()) + '.' + formatNumber(date.getMonth() + 1) + '.' + date.getFullYear() + ' ' + formatNumber(date.getHours()) + ':' + formatNumber(date.getMinutes());
        }

        var savedNumber = "190009";
        try {
            var localVal = localStorage.getItem('savedBusNumber');
            if (localVal) { savedNumber = localVal; }
        } catch(e) {}

        document.getElementById('bus-number').innerText = savedNumber;
        document.getElementById('bus-number-input').value = savedNumber;

        var now = new Date();
        var expirationTime = new Date(now.getTime() + 40 * 60 * 1000); // 40 минут как в оригинале

        document.getElementById('time-start').innerText = formatDate(now);
        document.getElementById('time-end').innerText = formatDate(expirationTime);
    </script>
</body>
</html>
